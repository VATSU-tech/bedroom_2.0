<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>room dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="w3.css">
    <script type="text/javascript" src="script.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <span class="pulse-indicator"></span>
                <h1>VATSU room</h1>
            </div>
            <div class="status-badge" id="connectionStatus">Connecté</div>
        </header>

        <main class="grid-layout">
            <!-- Control Card -->
            <section class="card control-card">
                <h2>Contrôle de la lampe</h2>
                <p class="card-description">Allumez ou éteignez la LED intégrée de la carte.</p>
                <div id="platformInfo" style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; font-weight: 600;">Détection de la carte...</div>
                <div class="button-group">
                    <button id="btnOn" onclick="onButton()" class="btn btn-on">ON</button>
                    <button id="btnOff" onclick="offButton()" class="btn btn-off">OFF</button>
                </div>
            </section>

            <!-- Sensor Card -->
            <section class="card sensor-card">
                <h2>Luminosité</h2>
                <p class="card-description">Niveau de lumière ambiante mesuré par le capteur.</p>
                <div class="gauge-container">
                    <div class="gauge-value" id="valeurLuminosite">0</div>
                    <div class="gauge-unit">ADC</div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Propulsé par <a href="https://github.com/VATSU-tech" target="_blank" rel="noopener noreferrer">VATSU-tech</a></p>
        </footer>
    </div>
</body>
</html>
